<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0f"/>
  
  <!-- Terminal frame -->
  <rect x="2" y="2" width="28" height="28" rx="4" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.6"/>
  
  <!-- Terminal prompt: >_ -->
  <path d="M8 10l6 6-6 6" stroke="#00f0ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="18" y1="22" x2="24" y2="22" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Glow dot -->
  <circle cx="26" cy="6" r="2" fill="#00f0ff">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
